<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirme seu acesso ao Plano de Voo</title>
  </head>
  <body style="font-family: Arial, sans-serif; line-height: 1.5; color: #1f2937;">
    <h1>Confirme seu email para continuar</h1>
    <p>Oi {{ params.first_name | default("Profissional") }},</p>
    <p>
      Para concluir seu cadastro no Plano de Voo, confirme seu email no botao abaixo:
    </p>
    <p>
      <a href="{{ params.confirmation_url }}" style="display:inline-block;padding:12px 18px;background:#1d4ed8;color:#fff;text-decoration:none;border-radius:6px;">
        Confirmar email
      </a>
    </p>
    <p>Depois da confirmacao, voce recebera os proximos passos.</p>
    <p>Equipe DECOLE</p>
  </body>
</html>
