name = "decole-links-redirect"
main = "src/index.ts"
compatibility_date = "2026-02-05"
workers_dev = false
routes = [
  { pattern = "links.decolesuacarreiraesg.com.br/*", zone_name = "decolesuacarreiraesg.com.br" }
]

[[queues.producers]]
binding = "FUNNEL_EVENTS"
queue = "decole-q-funnel-events"

[[kv_namespaces]]
binding = "IDENTITY_KV"
id = "88989e2e3492459eadb06e9da523dfae"

[observability]
  [observability.logs]
  enabled = false
  invocation_logs = true

# ── Cloudflare Secrets Store bindings (Slice 2.11A.2) ──────────────────────
# links-redirect não usa secrets de tenant — configuração vem do catálogo bundled
# (Slice 2.11C.3: env vars legadas removidas; catálogo é a única fonte de verdade)
