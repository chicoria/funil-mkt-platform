name = "decole-api-hotmart-ingress"
main = "src/index.ts"
compatibility_date = "2026-04-22"
workers_dev = false
routes = [
  "api.decolesuacarreiraesg.com.br/webhooks/v1/decole-esg/hotmart/*",
  "api.decolesuacarreiraesg.com.br/webhooks/v1/planovoo/hotmart/*",
  "api.decolesuacarreiraesg.com.br/webhooks/v1/plano-de-voo/hotmart/*"
  # SUPERARE (futuro, Slice 2.7 multi-tenant): adicionar quando zona DNS estiver ativa.
  # "api.superare.com.br/webhooks/v1/*/hotmart/*"
]

[vars]
DEFAULT_TENANT_ID = "decole"

# ── Cloudflare Secrets Store bindings (Slice 2.11A.2) ──────────────────────
[[secrets_store_secrets]]
binding = "HOTMART_WEBHOOK_TOKEN_DECOLE"
store_id = "23bdc9c2e8ca470d82352c53ec8d2e67"
secret_name = "hotmart_webhook_token_decole"

[[queues.producers]]
binding = "FUNNEL_EVENTS"
queue = "decole-q-funnel-events"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true
