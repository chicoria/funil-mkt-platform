name = "decole-api-funnel-ingress"
main = "src/index.ts"
compatibility_date = "2026-04-22"
workers_dev = false
routes = [
  "api.decolesuacarreiraesg.com.br/funnel/*",
  "api.decolesuacarreiraesg.com.br/webhooks/v1/planovoo/app/event"
  # SUPERARE (futuro, Slice 2.7 multi-tenant): adicionar quando zona DNS estiver ativa.
  # "api.superare.com.br/funnel/*"
]

[[queues.producers]]
binding = "FUNNEL_EVENTS"
queue = "decole-q-funnel-events"

# ── Cloudflare Secrets Store bindings (Slice 2.11A.2) ──────────────────────
[[secrets_store_secrets]]
binding = "PLANOVOO_HOOK_SECRET_DECOLE"
store_id = "23bdc9c2e8ca470d82352c53ec8d2e67"
secret_name = "planovoo_hook_secret_decole"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true
