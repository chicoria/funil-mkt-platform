name = "decole-api-hotmart-webhook"
main = "src/index.ts"
compatibility_date = "2025-01-01"
workers_dev = false
routes = [
  "api.decolesuacarreiraesg.com.br/webhooks/hotmart*"
]

[[queues.producers]]
binding = "HOTMART_EVENTS"
queue = "decole-q-hotmart-events"

[observability]
  [observability.logs]
  enabled = false
  invocation_logs = true
