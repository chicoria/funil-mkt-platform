name = "decole-funnel-dispatcher"
main = "src/index.ts"
compatibility_date = "2026-04-22"
workers_dev = true

# ── Workers Analytics Engine — engagement raw events drill-down ─────────────
[[analytics_engine_datasets]]
binding = "ENGAGEMENT_AE"
dataset = "engagement_events"

[vars]
PLANOVOO_API_BASE_URL = "https://plano.decolesuacarreiraesg.com.br"

# ── Cloudflare Secrets Store bindings (Slice 2.11A.2) ──────────────────────
# store_id: default_secrets_store (23bdc9c2e8ca470d82352c53ec8d2e67)
# Workers ainda lêem per-worker secrets como fallback (helper wrapper).
# Fallbacks removidos na Fase 4 (slice 2.11A.9).

[[secrets_store_secrets]]
binding = "BREVO_API_KEY_DECOLE"
store_id = "23bdc9c2e8ca470d82352c53ec8d2e67"
secret_name = "brevo_api_key_decole"

[[secrets_store_secrets]]
binding = "HOTMART_WEBHOOK_TOKEN_DECOLE"
store_id = "23bdc9c2e8ca470d82352c53ec8d2e67"
secret_name = "hotmart_webhook_token_decole"

[[secrets_store_secrets]]
binding = "SGTM_ENDPOINT_URL_DECOLE"
store_id = "23bdc9c2e8ca470d82352c53ec8d2e67"
secret_name = "sgtm_endpoint_url_decole"

[[secrets_store_secrets]]
binding = "GA4_MEASUREMENT_ID_DECOLE"
store_id = "23bdc9c2e8ca470d82352c53ec8d2e67"
secret_name = "ga4_measurement_id_decole"

[[secrets_store_secrets]]
binding = "GA4_API_SECRET_DECOLE"
store_id = "23bdc9c2e8ca470d82352c53ec8d2e67"
secret_name = "ga4_api_secret_decole"

[[secrets_store_secrets]]
binding = "META_CAPI_ACCESS_TOKEN_DECOLE"
store_id = "23bdc9c2e8ca470d82352c53ec8d2e67"
secret_name = "meta_capi_access_token_decole"

[[secrets_store_secrets]]
binding = "META_PIXEL_ID_DECOLE_ESG"
store_id = "23bdc9c2e8ca470d82352c53ec8d2e67"
secret_name = "meta_pixel_id_decole_esg"

[[secrets_store_secrets]]
binding = "META_PIXEL_ID_DECOLE_PLANOVOO"
store_id = "23bdc9c2e8ca470d82352c53ec8d2e67"
secret_name = "meta_pixel_id_decole_planovoo"

[[secrets_store_secrets]]
binding = "PLANOVOO_API_BASE_URL_DECOLE"
store_id = "23bdc9c2e8ca470d82352c53ec8d2e67"
secret_name = "planovoo_api_base_url_decole"

[[secrets_store_secrets]]
binding = "PLANOVOO_HOOK_SECRET_DECOLE"
store_id = "23bdc9c2e8ca470d82352c53ec8d2e67"
secret_name = "planovoo_hook_secret_decole"

# N8N_WEBHOOK_URL removido: forward_n8n não está em nenhuma chain do catálogo
# (código morto). Cleanup completo programado no slice 2.11A.9 (Fase 4).

[[queues.consumers]]
queue = "decole-q-funnel-events"
max_batch_size = 25
max_batch_timeout = 10
max_retries = 5
dead_letter_queue = "decole-q-funnel-events-dlq"

[[kv_namespaces]]
binding = "DEDUPE_KV"
id = "aadb6b3ff1024cc5aeb3119e6c662863"

[[kv_namespaces]]
binding = "IDENTITY_KV"
id = "88989e2e3492459eadb06e9da523dfae"

[[d1_databases]]
binding = "IDENTITY_DB"
database_name = "decole-d1-identity"
database_id = "e71a266a-b400-4970-a056-bf7223799f25"

[[d1_databases]]
binding = "EVENT_STORE_DB"
database_name = "decole-d1-event-store"
database_id = "f5c19aac-2bdc-4fe4-b560-e1c49199ff4c"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true
