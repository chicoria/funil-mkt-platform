name = "decole-funnel-dispatcher"
main = "src/index.ts"
compatibility_date = "2026-04-23"
workers_dev = true

[[queues.consumers]]
queue = "decole-q-funnel-events"
max_batch_size = 25
max_batch_timeout = 10
max_retries = 5
dead_letter_queue = "decole-q-funnel-events-dlq"

[[kv_namespaces]]
binding = "DEDUPE_KV"
id = "placeholder_dedupe_kv_id"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true
