name = "decole-funnel-dispatcher"
main = "src/index.ts"
compatibility_date = "2026-04-23"
workers_dev = true

[[queues.consumers]]
queue = "decole-q-funnel-events"
max_batch_size = 25
max_batch_timeout = 10
max_retries = 5
dead_letter_queue = "decole-q-funnel-events-dlq"

[[kv_namespaces]]
binding = "DEDUPE_KV"
id = "placeholder_dedupe_kv_id"

[[kv_namespaces]]
binding = "IDENTITY_KV"
id = "placeholder_identity_kv_id"

[[d1_databases]]
binding = "IDENTITY_DB"
database_name = "decole-d1-identity"
database_id = "placeholder_identity_db_id"

[[d1_databases]]
binding = "EVENT_STORE_DB"
database_name = "decole-d1-event-store"
database_id = "placeholder_event_store_db_id"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true
