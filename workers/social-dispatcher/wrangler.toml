name = "decole-social-dispatcher"
main = "src/index.ts"
compatibility_date = "2026-04-22"
workers_dev = true

# ── Cloudflare Secrets Store binding ────────────────────────────────────────
[[secrets_store_secrets]]
binding = "META_SYSTEM_USER_ACCESS_TOKEN_DECOLE"
store_id = "23bdc9c2e8ca470d82352c53ec8d2e67"
secret_name = "meta_system_user_access_token_decole"

[[secrets_store_secrets]]
binding = "ZERNIO_API_KEY_DECOLE"
store_id = "23bdc9c2e8ca470d82352c53ec8d2e67"
secret_name = "zernio_api_key_decole"

# ── Fila + KV (criados no Slice 6) ──────────────────────────────────────────
[[queues.consumers]]
queue = "decole-q-social-events"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "decole-q-social-events-dlq"

[[kv_namespaces]]
binding = "SOCIAL_DEDUPE_KV"
id = "ba79379ce2094ae48b2657ee3c75db62"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true
