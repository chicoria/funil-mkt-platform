name: E2E Funnel Staging

on:
  workflow_dispatch:

jobs:
  e2e-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install wrangler workspace deps
        working-directory: workers/funnel-dispatcher
        run: npm ci

      - name: Run E2E scenarios
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bash tests/run-scenarios.sh --all --skip-sgtm
