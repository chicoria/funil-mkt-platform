name: Deploy - funnel-dispatcher

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Executar como dry-run (sem publicar)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  deploy:
    name: Deploy funnel-dispatcher
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verificar placeholders _PENDENTE
        run: |
          bash scripts/check-pending-placeholders.sh --worker funnel-dispatcher

      - name: Install dependencies
        working-directory: workers/funnel-dispatcher
        run: npm ci

      - name: Typecheck
        working-directory: workers/funnel-dispatcher
        run: npx tsc --noEmit

      - name: Testes
        working-directory: workers/funnel-dispatcher
        run: npm test

      - name: Deploy (dry-run)
        if: inputs.dry_run == 'true'
        working-directory: workers/funnel-dispatcher
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy --dry-run

      - name: Deploy
        if: inputs.dry_run == 'false'
        working-directory: workers/funnel-dispatcher
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy
